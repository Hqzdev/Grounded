name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run check:database

  python-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/auth
          - services/embedding
          - services/ingestion
          - services/retrieval
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r ${{ matrix.service }}/requirements.txt
      - run: python -m compileall ${{ matrix.service }}/app

  gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: npm run check:gateway

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run check:web

  security-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: grounded
          POSTGRES_USER: grounded
          POSTGRES_PASSWORD: grounded
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U grounded -d grounded"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://grounded:grounded@localhost:5432/grounded?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy --schema packages/database/prisma/schema.prisma
      - run: npm run db:generate
      - run: npm run test:security

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - database
      - python-services
      - gateway
      - web
      - security-tests
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f infra/docker/docker-compose.yml build gateway auth ingestion embedding retrieval web
